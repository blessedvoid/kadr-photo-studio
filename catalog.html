<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Кадр</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container header__inner">

    <a href="index.html" class="logo">Кадр</a>

    <nav class="nav">
      <ul class="nav__list">
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>

    <a href="index.html#booking" class="btn">Записаться</a>
    <div class="burger">☰</div>

  </div>
</header>

<!-- MAIN -->
<main class="catalog-page">
  <div class="container">

    <h1>Каталог фотосессий</h1>

    <div class="catalog-layout">

      <!-- SIDEBAR -->
      <aside class="filters">

        <h3>Фильтры</h3>

        <!-- поиск -->
        <input type="text" id="search" placeholder="Поиск...">

        <!-- категории -->
        <div class="filter-group">
          <p>Тип съёмки</p>
          <label><input type="checkbox"> Портретная</label>
          <label><input type="checkbox"> Семейная</label>
          <label><input type="checkbox"> Love Story</label>
          <label><input type="checkbox"> Детская</label>
        </div>

        <!-- цена -->
        <div class="filter-group">
          <p>Цена</p>
          <input type="number" placeholder="От">
          <input type="number" placeholder="До">
        </div>

        <button class="btn">Применить</button>
        <button class="btn btn-reset">Сбросить</button>

      </aside>

      <!-- CONTENT -->
      <section class="catalog-content">

        <!-- верх -->
        <div class="catalog-top">
          <select>
            <option>Сортировка</option>
            <option>По цене</option>
          </select>

          <span>Найдено: 0</span>
        </div>

        <!-- карточки -->
        <div class="catalog-grid">
          <!-- JS вставит сюда карточки -->
        </div>

      </section>

    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer__grid">

    <div>
      <h3>Кадр</h3>
      <p>Фотостудия</p>
    </div>

    <div>
      <h4>Навигация</h4>
      <p><a href="index.html">Главная</a></p>
      <p><a href="catalog.html">Каталог</a></p>
      <p><a href="contacts.html">Контакты</a></p>
    </div>

    <div>
      <h4>Контакты</h4>
      <p><a href="tel:+79999999999">+7 999 999-99-99</a></p>
      <p><a href="mailto:info@kadr.ru">info@kadr.ru</a></p>
    </div>

  </div>

  <p class="footer__copy">© 2026 Кадр</p>
</footer>

<!-- КНОПКА НАВЕРХ -->
<button id="topBtn">↑</button>

<script src="js/catalog.js"></script>

</body>
</html>
