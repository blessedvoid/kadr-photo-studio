<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Кадр</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- overlay для бургер-меню -->
<div class="overlay"></div>

<!-- HEADER -->
<header class="header">
  <div class="container header__inner">

    <div class="logo">Кадр</div>

    <nav class="nav">
      <ul class="nav__list">
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>

    <a href="index.html#booking" class="btn">Записаться</a>

    <div class="burger">☰</div>

  </div>
</header>

<!-- MAIN -->
<main>

<section class="contacts">
  <div class="container contacts__grid">

    <!-- ИНФА -->
    <div class="contacts__info">
      <h2>Контакты</h2>

      <p>📍 Москва, ул. Пример, 10</p>

      <p>📞 <a href="tel:+79999999999">+7 999 999-99-99</a></p>

      <p>✉️ <a href="mailto:info@kadr.ru">info@kadr.ru</a></p>

      <p>🕒 Пн–Вс: 10:00 – 20:00</p>

      <div class="contacts__socials">
        <a href="#">VK</a>
        <a href="#">Instagram</a>
      </div>
    </div>

    <!-- ФОРМА -->
    <form class="contact-form" id="contactForm">

      <input type="text" placeholder="Имя" required>
      <input type="email" placeholder="Email" required>
      <input type="tel" placeholder="Телефон" required>

      <select required>
        <option value="">Тема обращения</option>
        <option>Запись</option>
        <option>Вопрос</option>
      </select>

      <textarea placeholder="Сообщение" required></textarea>

      <button class="btn">Отправить</button>

    </form>

  </div>
</section>

<!-- КАРТА -->
<section class="map">
  <iframe 
    src="https://www.openstreetmap.org/export/embed.html?bbox=37.60,55.75,37.62,55.76&layer=mapnik"
    style="width:100%; height:400px; border:0;">
  </iframe>
</section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container footer__grid">

    <div>
      <h3>Кадр</h3>
      <p>Фотостудия</p>
    </div>

    <div>
      <h4>Навигация</h4>
      <p><a href="catalog.html">Каталог</a></p>
      <p><a href="contacts.html">Контакты</a></p>
    </div>

    <div>
      <h4>Контакты</h4>
      <p>+7 999 999-99-99</p>
      <p>info@kadr.ru</p>
    </div>

  </div>

  <p class="footer__copy">© 2026 Кадр</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
