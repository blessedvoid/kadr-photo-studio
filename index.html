<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фотостудия «Кадр»</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- overlay ВНЕ header -->
<div class="overlay"></div>

<!-- HEADER -->
<header class="header">
  <div class="container header__inner">

    <div class="logo">Кадр</div>

    <nav class="nav">
      <ul class="nav__list">
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="#booking">Запись</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>

    <a href="#booking" class="btn">Записаться</a>

    <div class="burger">☰</div>

  </div>
</header>

<main>

<!-- HERO -->
<section class="hero">
  <div class="container hero__content">
    <h1>Фотостудия «Кадр»</h1>
    <p>Создаём атмосферные и живые фотографии</p>
    <a href="#booking" class="btn">Записаться</a>
  </div>
</section>

<!-- POPULAR -->
<section class="popular">
  <div class="container">
    <h2>Популярные съёмки</h2>

    <div class="popular__grid">

      <div class="catalog-card">
        <img src="images/portret.jpg">
        <h3>Портретная</h3>
        <span>15000₽</span>
      </div>

      <div class="catalog-card">
        <img src="images/family.jpg">
        <h3>Семейная</h3>
        <span>25000₽</span>
      </div>

      <div class="catalog-card">
        <img src="images/lovestory.jpg">
        <h3>Love Story</h3>
        <span>20000₽</span>
      </div>

    </div>
  </div>
</section>

<!-- ADVANTAGES -->
<section class="advantages">
  <div class="container">
    <h2>Почему выбирают нас</h2>

    <div class="advantages__grid">
      <div class="card">📸 Профессионализм</div>
      <div class="card">✨ Свет</div>
      <div class="card">🎯 Подход</div>
      <div class="card">💡 Идеи</div>
    </div>

  </div>
</section>

<!-- BOOKING -->
<section class="booking" id="booking">
  <div class="container">
    <h2>Запись</h2>
    <form id="bookingForm">
      <input type="text" placeholder="Имя" required>
      <input type="email" placeholder="Email" required>
      <button class="btn">Отправить</button>
    </form>
  </div>
</section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© 2026 Кадр</p>
  </div>
</footer>

<script src="js/script.js"></script>

</body>
</html>
